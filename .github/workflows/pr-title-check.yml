name: "Enforce PR Title Convention"

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  check-title-length:
    name: "Check PR Title Length"
    runs-on: ubuntu-latest
    needs: check-title-format
    steps:
      - name: Validate PR title length
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const maxLength = 30;

            if (title.length > maxLength) {
              core.setFailed(
                `❌ PR title too long (${title.length} chars).\n` +
                `Title must be at most ${maxLength} characters long.`
              );
            } else {
              console.log(`✅ PR title length OK (${title.length} chars).`);
            }
